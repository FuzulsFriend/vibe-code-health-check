  <text x="305" y="379" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f1f5f9" text-anchor="middle">Supabase</text>

  <rect x="360" y="360" width="82" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="401" y="379" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f1f5f9" text-anchor="middle">Python</text>

  <rect x="452" y="360" width="82" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="493" y="379" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f1f5f9" text-anchor="middle">Firebase</text>

