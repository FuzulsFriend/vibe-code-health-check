  <text x="784" y="478" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b">console.logs  ·</text>
  <text x="892" y="478" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f59e0b" font-weight="600">7</text>
  <text x="906" y="478" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b">oversized files  ·</text>
  <text x="1022" y="478" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f59e0b" font-weight="600">15</text>
  <text x="1040" y="478" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b">SELECT *  ·</text>
  <text x="1108" y="478" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#f59e0b" font-weight="600">27</text>
