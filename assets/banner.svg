  <text x="60" y="622" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#334155">by</text>
  <text x="79" y="622" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#22c55e">FuzulsFriend</text>
